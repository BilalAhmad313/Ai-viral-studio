<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Viral Studio Logo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    font-family:Arial, sans-serif;
}

.logo-box{
    width:300px;
    height:300px;
    border:10px solid #fff;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.ai{
    font-size:90px;
    font-weight:900;
    color:#f4d44d;
    line-height:1;
    letter-spacing:3px;
}

.text{
    text-align:center;
    color:white;
    font-weight:900;
    font-size:28px;
    line-height:1.1;
    letter-spacing:2px;
}
</style>
</head>
<body>

<div class="logo-box">
    <div class="ai">AI</div>
    <div class="text">
        VIRAL<br>
        STUDIO
    </div>
</div>

</body>
</html>
