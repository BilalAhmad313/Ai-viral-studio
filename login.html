<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login — AI Viral Studio</title>
  <meta name="description" content="Login to AI Viral Studio" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Poppins:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <canvas id="particles"></canvas>

  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">AI Viral Studio</a>
      <nav class="nav">
        <a href="index.html#about">About</a>
        <a href="index.html#portfolio">Portfolio</a>
        <a href="index.html#prompt-library">Prompt Library</a>
        <a href="index.html#blog">Blog</a>
        <a href="index.html#faq">FAQ</a>
        <a class="cta" href="login.html">Login</a>
      </nav>
      <button class="nav-toggle" aria-label="Toggle navigation">☰</button>
    </div>
  </header>

  <main style="position:relative;z-index:2">
    <section class="section">
      <div class="container" style="max-width:560px">
        <h2 style="margin-top:0">Login</h2>
        <p class="lead" style="margin-top:0">Members area login UI (placeholder — backend auth not connected yet).</p>

        <div class="card glass" style="padding:18px">
          <form id="login-form" autocomplete="on">
            <label style="display:block;color:var(--muted);margin-bottom:6px">Email</label>
            <input type="email" name="email" placeholder="you@example.com" required
              style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:#eaf6ff;margin-bottom:12px" />

            <label style="display:block;color:var(--muted);margin-bottom:6px">Password</label>
            <input type="password" name="password" placeholder="••••••••" required
              style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:#eaf6ff;margin-bottom:12px" />

            <div class="form-actions">
              <button type="submit" class="btn primary" style="width:100%">Login</button>
            </div>

            <div style="margin-top:10px;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap">
              <a href="signup.html" class="btn ghost" style="border-radius:10px">Create account</a>
              <a href="forgot-password.html" class="btn ghost" style="border-radius:10px">Forgot password</a>
            </div>

            <p id="login-status" class="muted small" style="margin-top:12px"></p>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© AI Viral Studio — All rights reserved.</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
  <script>
    // Frontend-only placeholder behavior
    const form = document.getElementById('login-form');
    const status = document.getElementById('login-status');
    form?.addEventListener('submit', (e) => {
      e.preventDefault();
      status.textContent = 'Login is coming soon. Connect Firebase/Supabase auth to enable real login.';
    });
  </script>
</body>
</html>
